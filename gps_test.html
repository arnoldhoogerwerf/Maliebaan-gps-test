<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GPS Crossfade Test — Aldus spreekt De Maliebaan</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
<style>
  body { background: #0e1410; color: #e8efe9; font-family: sans-serif; padding: 20px; }
  #map-outer { height: 300px; border-radius: 10px; overflow: hidden; }
  #map { width: 100%; height: 100%; }
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .status-item { background: #161d18; padding: 10px; border-radius: 8px; }
  button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: #1f8a4c; color: white; }
</style>
</head>
<body>

<h1>GPS Crossfade Test</h1>
<div id="map-outer"><div id="map"></div></div>

<div class="status-grid">
  <div class="status-item">GPS: <span id="gpsStatus">gestopt</span></div>
  <div class="status-item">Kompas: <span id="compassValue">—</span></div>
</div>
<button id="gpsToggle">Start GPS</button>
<button id="audioToggle">Activeer audio</button>

<script>
(function() {
  let map, audioCtx, audioListener, currentPos, watchId;
  let zones = [];
  let smoothedHeading = 0;
  let uiHeading = 0;

  // 1. Initialisatie Kaart
  function initMap() {
    map = L.map('map', { rotate: true, rotateControl: false }).setView([52.0907, 5.1214], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
  }

  // 2. De "Gouden Loop" (60 fps)
  function tick() {
    if (currentPos && audioListener) {
      // AudioListener continu bijwerken op basis van laatste GPS
      const x = (currentPos.longitude - 5.1214) * 70000;
      const z = (currentPos.latitude - 52.0907) * 111000;
      audioListener.positionX.value = x;
      audioListener.positionZ.value = -z;
    }

    // Kaart en kompas continu bijwerken (vloeiende rotatie)
    if (map && typeof map.setBearing === 'function') {
      uiHeading += (smoothedHeading - uiHeading) * 0.1;
      map.setBearing(-uiHeading);
    }
    
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // 3. Sensor & GPS Handlers
  window.addEventListener('deviceorientation', (e) => {
    smoothedHeading = e.webkitCompassHeading || (360 - e.alpha);
    document.getElementById('compassValue').textContent = Math.round(smoothedHeading) + '°';
  });

  function onPosition(pos) {
    currentPos = pos.coords;
    document.getElementById('gpsStatus').textContent = 'actief';
  }

  document.getElementById('gpsToggle').addEventListener('click', () => {
    if (!watchId) {
      watchId = navigator.geolocation.watchPosition(onPosition, console.error, {enableHighAccuracy: true});
    }
  });

  document.getElementById('audioToggle').addEventListener('click', () => {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioListener = audioCtx.listener;
  });

  initMap();
})();
</script>
</body>
</html>
