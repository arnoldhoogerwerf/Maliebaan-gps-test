<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<style>

  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: env(safe-area-inset-top) 16px 32px 16px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  #map-outer { height: 280px; border-radius: 10px; border: 1px solid var(--line); margin-top: 4px; overflow: hidden; position: relative; }
  #map { width: 100%; height: 100%; }
  #map-north-indicator { position: absolute; top: 8px; right: 8px; z-index: 1000; background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 3px 7px; font-size: 11px; color: var(--muted); pointer-events: none; }
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
  .status-item { background: var(--well); border-radius: 8px; padding: 10px; }
  .gain-bar-track { height: 6px; background: var(--well); border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .gain-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s linear; }
</style>
</head>

<div class="panel">

  <div id="map-outer">

    <div id="map-north-indicator">N <span id="map-north-arrow" style="display:inline-block;">↑</span></div>
  </div>
</div>

<div class="panel">
  <h2>Status</h2>
  <div class="status-grid">

    <div class="status-item"><div>Kompas</div><div id="compassValue">—</div></div>
  </div>
  <button class="full primary" id="gpsToggle">Start GPS</button>
  <button class="full" id="audioToggle">Activeer audio</button>
  <button class="full" id="compassToggle">Activeer richtingssensor</button>
</div>

<div class="panel">
  <h2>Zones</h2>
  <div id="zoneList"></div>
</div>
