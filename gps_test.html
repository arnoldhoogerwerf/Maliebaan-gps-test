</div>

<script>
(function() {
  // ... (Al jouw originele variabelen en functies blijven hier staan) ...
  let zones = [];
  let watchId = null, currentPos = null, audioCtx = null;
  let rafId = null;
  let smoothedHeading = null;
  let uiHeading = null;

  // --- De gecorrigeerde Loop ---
  function tick() {
    // 1. Update audio-listener en zones 60x per sec
    if (currentPos) {
       updateAllZones(); 
    }
    
    // 2. Update kaart en kompas-naalden 60x per sec (deze draait nu vloeiend)
    updateCompassNeedles();
    
    // 3. Audio interpolatie (gain/filter bijwerken)
    // ... (jouw bestaande interpolatie-logica uit startInterpolationLoop) ...
    
    rafId = requestAnimationFrame(tick);
  }

  // --- Start de loop ---
  rafId = requestAnimationFrame(tick);

  // --- Pas onPosition aan ---
  function onPosition(pos) {
    // Verwijder hier de regel: updateAllZones();
    // Verwijder hier de regel: updateCompassNeedles();
    currentPos = { latitude: pos.coords.latitude, longitude: pos.coords.longitude };
    // ... (rest van je onPosition logica)
  }

  // ... (de rest van je originele code) ...
  
  // Zorg dat je in je `updateCompassNeedles` functie de `map.setBearing(-uiHeading)` hebt staan.
  // Omdat deze functie nu door tick() wordt aangeroepen, draait de kaart nu live mee met je telefoon.
})();
</script>
